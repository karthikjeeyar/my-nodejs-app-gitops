apiVersion: v1
kind: ServiceAccount
metadata:
  name: pipeline
  namespace: {{ .Values.app.namespace }}
  labels:
    app.kubernetes.io/name: {{ .Values.app.name }}
    app.kubernetes.io/instance: {{ .Values.app.name }}
{{- if .Values.git.secretName }}
secrets:
  - name: {{ .Values.git.secretName }}
{{- end }}

