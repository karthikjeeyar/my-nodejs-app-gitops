{{- if .Values.sealedSecrets.enabled }}
apiVersion: bitnami.com/v1alpha1
kind: SealedSecret
metadata:
  name: {{ .Values.image.secretName | default "registry-credentials" }}
  namespace: {{ .Values.app.namespace }}
  labels:
    app.kubernetes.io/name: {{ .Values.app.name }}
    app.kubernetes.io/instance: {{ .Values.app.name }}
spec:
  encryptedData:
    .dockerconfigjson: {{ .Values.sealedSecrets.dockerconfigjson | required "sealedSecrets.dockerconfigjson is required when sealedSecrets.enabled is true" }}
  template:
    metadata:
      name: {{ .Values.image.secretName }}
      namespace: {{ .Values.app.namespace }}
      labels:
        app.kubernetes.io/name: {{ .Values.app.name }}
        app.kubernetes.io/instance: {{ .Values.app.name }}
    type: "kubernetes.io/dockerconfigjson"
{{- end }}

